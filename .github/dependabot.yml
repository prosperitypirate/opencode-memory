version: 2
updates:
  # Python backend dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"

  # Plugin (npm/bun) dependencies
  - package-ecosystem: "npm"
    directory: "/plugin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "plugin"
    ignore:
      # @lancedb/lancedb: pinned at 0.15.0 — darwin-x64 NAPI binary missing from all
      # versions >= 0.24.1 due to upstream build bug. Upgrading would break Intel Mac users.
      # Track: https://github.com/lancedb/lancedb/issues/2937
      # To upgrade: confirm darwin-x64 is restored, remove this ignore rule, then run
      # spike.ts + full test suite (unit + integration) before merging.
      - dependency-name: "@lancedb/lancedb"
        versions: ["*"]

  # Frontend (npm/bun) dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

  # Docker
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
